{% extends "layout.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/GestionarRutas.css') }}">
{% endblock %}

{% block content %}

<div class="Titulos">
    <span>{{ title_web }}</span>
    <div class="hr"></div>
</div>

<div class="ContenedorRutas">

    <!-- Sección de Configuración de Ruta -->
    <div class="ConfiguracionRuta">
        <h3>Configurar Nueva Ruta</h3>

        <div class="FormGroup">
            <label>Nombre de la Ruta</label>
            <input type="text" id="nombreRuta" placeholder="Ej: Ruta A - Centro" required>
        </div>

        <div class="FormGroup">
            <label>Departamento</label>
            <select id="departamento" required>
                <option value="">Seleccionar departamento...</option>
                {% for dept in departamentos %}
                <option value="{{ dept.id_departamento }}">{{ dept.nombre }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="FormGroup">
            <label>Tienda</label>
            <select id="tienda" required disabled>
                <option value="">Seleccionar tienda...</option>
            </select>
        </div>
    </div>

    <!-- Sección de Escaneo -->
    <div class="SeccionEscaneo">
        <h3>Escanear Códigos de Barra</h3>
        <div class="InputEscaneo">
            <label>Escanea el código con la pistola:</label>
            <input type="text" id="codigoBarras" placeholder="Escanea aquí..." autocomplete="off">
            <small>El foco permanecerá en este campo automáticamente</small>
        </div>
    </div>

    <!-- Sección de Lista de Rutas -->
    <div class="SeccionLista">
        <h3>Paquetes en Ruta (<span id="contadorPaquetes">0</span>)</h3>

        <div class="ListaPaquetes" id="listaPaquetes">
            <p class="mensaje-vacio">No hay paquetes agregados aún</p>
        </div>

        <div class="BotonesAccion">
            <button id="btnLimpiar" class="btn btn-danger">Limpiar Todo</button>
            <button id="btnGuardar" class="btn btn-success" disabled>Guardar Ruta</button>
            <a href="{{ url_for('rutas.ver_rutas') }}" class="btn btn-secondary">Ver Rutas</a>
        </div>
    </div>

</div>

<script src="{{ url_for('static', filename='js/gestionar_rutas.js') }}"></script>

{% endblock %}
